set timeout=0
set default=0

menuentry "my-os Linux (normal)" {
    linux /boot/bzImage quiet loglevel=3
    initrd /boot/initramfs.cpio.gz
    boot
}

menuentry "my-os Linux (verbose)" {
    linux /boot/bzImage loglevel=7
    initrd /boot/initramfs.cpio.gz
    boot
}

menuentry "my-os Linux (debug)" {
    linux /boot/bzImage loglevel=7 ignore_loglevel initcall_debug earlyprintk=serial,ttyS0,115200 console=tty0 console=ttyS0,115200n8
    initrd /boot/initramfs.cpio.gz
    boot
}